[package]
name = "csalt"
version = "0.4.2"
edition = "2024"

[dependencies]
clap = { version = "4.4", features = ["derive"] }
dirs = "5.0"
reqwest = { version = "0.11", features = ["blocking"], optional = true }
self_update = { version = "0.44", optional = true }
serde = { version = "1.0", features = ["derive"] }
toml = { version = "1.1" }

[features]
default = []
experimental = ["reqwest", "self_update"]
